<!DOCTYPE html>
<html lang="es">
<script src="https://unpkg.com/html5-qrcode"></script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catálogo ITF Grupo Grisi</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:800px;
    margin:auto;
    padding:20px;
}

input{
    width:100%;
    padding:12px;
    font-size:18px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:12px;
    font-size:18px;
    cursor:pointer;
}

#resultado{
    margin-top:20px;
    padding:15px;
    border:1px solid #ddd;
    border-radius:8px;
}
</style>
</head>

<body>

<h2>Consulta de Material por ITF</h2>

<input id="itf" placeholder="Ingresa o escanea el ITF">

<button onclick="iniciarEscaner()">📷 Escanear código</button>

<button onclick="buscar()">🔍 Buscar</button>

<div id="reader"></div>

<div id="resultado"></div>

<script>

let datos=[];

fetch('materiales.csv')
.then(response => response.text())
.then(texto => {

const filas = texto.split('\n');

const encabezados = filas[0].split(',');

for(let i=1;i<filas.length;i++){

if(!filas[i].trim()) continue;

const columnas = filas[i].split(',');

datos.push({
MATERIAL: columnas[0],
DESCRIPCION: columnas[1],
ITF: columnas[2],
CENTRO: columnas[3]
});

}

console.log("Registros cargados:", datos.length);

});

function buscar(){

const itf=document.getElementById('itf').value.trim();

const item=datos.find(
x => String(x.ITF).trim() === itf
);

if(item){

document.getElementById('resultado').innerHTML=`
<h3>${item.MATERIAL}</h3>
<p><b>Descripción:</b> ${item.DESCRIPCION}</p>
<p><b>Centro:</b> ${item.CENTRO}</p>
<p><b>ITF:</b> ${item.ITF}</p>
`;

}else{

document.getElementById('resultado').innerHTML=
'<b>Material no encontrado</b>';

}

}
    function iniciarEscaner(){

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
    { facingMode: "environment" },
    {
        fps: 10,
        qrbox: 250
    },
    (codigo) => {

        document.getElementById("itf").value = codigo;

        html5QrCode.stop();

        buscar();

    }
).catch(err => {
    alert("No se pudo abrir la cámara");
});

}
</script>

</body>
</html>
