<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Catálogo ITF Grupo Grisi</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(180deg,#eef4fb 0%,#f7f9fc 100%);
    max-width:900px;
    margin:auto;
    padding:20px;
}

.logo-container{
    text-align:center;
    margin-bottom:10px;
}

.logo{
    display:block;
    width:220px;
    height:auto;
    margin:0 auto;
}
}

h2{
    text-align:center;
    color:#0054A6;
    margin-bottom:10px;
}

.subtitulo{
    text-align:center;
    color:#666;
    margin-bottom:25px;
    font-size:16px;
}

input{
    width:100%;
    padding:15px;
    font-size:18px;
    border:2px solid #d9d9d9;
    border-radius:10px;
    box-sizing:border-box;
    background:white;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    opacity:.9;
}

.btn-escanear{
    background:#28a745;
    color:white;
}

.btn-buscar{
    background:#0054A6;
    color:white;
}

#reader{
    margin-top:15px;
}

#resultado{
    margin-top:25px;
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0 4px 12px rgba(0,0,0,.12);
    border-left:8px solid #0054A6;
}

.material{
    font-size:36px;
    font-weight:bold;
    color:#0054A6;
    margin-bottom:20px;
}

.info{
    font-size:20px;
    margin-bottom:12px;
}

.etiqueta{
    font-weight:bold;
    color:#666;
}

</style>
</head>

<body>

<div class="logo-container">
    <img src="grupogrisi_logo-Photoroom.png" alt="Grupo Grisi" class="logo">
</div>

<h2>Consulta de Material por ITF</h2>

<p class="subtitulo">
Escanea o captura el ITF para consultar información del material
</p>

<input id="itf" placeholder="Ingresa o escanea el ITF">

<button class="btn-escanear" onclick="iniciarEscaner()">
📷 Escanear código
</button>

<button class="btn-buscar" onclick="buscar()">
🔍 Buscar material
</button>

<div id="reader"></div>

<div id="resultado"></div>

<script>

let datos=[];

fetch('materiales.csv')
.then(response => response.text())
.then(texto => {

const filas = texto.split('\n');

for(let i=1;i<filas.length;i++){

if(!filas[i].trim()) continue;

const columnas = filas[i].split(',');

datos.push({
MATERIAL: columnas[0],
DESCRIPCION: columnas[1],
ITF: columnas[2],
CENTRO: columnas[3]
});

}

console.log("Registros cargados:", datos.length);

});

document.getElementById("itf").addEventListener("keypress", function(event){

if(event.key === "Enter"){
buscar();
}

});

function buscar(){

const itf=document.getElementById('itf').value.trim();

const item=datos.find(
x => String(x.ITF).trim() === itf
);

if(item){

document.getElementById('resultado').innerHTML=`

<div class="material">
📦 ${item.MATERIAL}
</div>

<div class="info">
<span class="etiqueta">Descripción:</span><br>
${item.DESCRIPCION}
</div>

<div class="info">
<span class="etiqueta">Centro:</span>
${item.CENTRO}
</div>

<div class="info">
<span class="etiqueta">ITF:</span>
${item.ITF}
</div>

`;

}else{

document.getElementById('resultado').innerHTML=`

<div style="text-align:center;padding:20px;">
<h3>❌ Material no encontrado</h3>
<p>Verifica el ITF e intenta nuevamente.</p>
</div>

`;

}

}

function iniciarEscaner(){

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
    { facingMode: "environment" },
    {
        fps: 10,
        qrbox: 250
    },
    (codigo) => {

        document.getElementById("itf").value = codigo;

        html5QrCode.stop();

        buscar();

    }
).catch(err => {

    alert("No se pudo abrir la cámara");

});

}

</script>

</body>
</html>
