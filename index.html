<!DOCTYPE html>
<html lang="es">
<script src="https://unpkg.com/html5-qrcode"></script>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Catálogo ITF Grupo Grisi</title>

<style>
body{
    font-family: 'Segoe UI', sans-serif;
    background:#f4f6f8;
    max-width:900px;
    margin:auto;
    padding:20px;
}

h2{
    text-align:center;
    color:#003366;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:15px;
    font-size:18px;
    border:2px solid #d9d9d9;
    border-radius:10px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    opacity:.9;
}

#reader{
    margin-top:15px;
}

#resultado{
    margin-top:25px;
    background:white;
    border-radius:15px;
    padding:25px;
    box-shadow:0 4px 12px rgba(0,0,0,.12);
}

.material{
    font-size:32px;
    font-weight:bold;
    color:#003366;
    margin-bottom:20px;
}

.info{
    font-size:20px;
    margin-bottom:12px;
}

.etiqueta{
    font-weight:bold;
    color:#666;
}
</style>
</head>

<body>

<h2>Consulta de Material por ITF</h2>

<input id="itf" placeholder="Ingresa o escanea el ITF">

<button onclick="iniciarEscaner()">📷 Escanear código</button>

<button onclick="buscar()">🔍 Buscar</button>

<div id="reader"></div>

<div id="resultado"></div>

<script>

let datos=[];

fetch('materiales.csv')
.then(response => response.text())
.then(texto => {

const filas = texto.split('\n');

const encabezados = filas[0].split(',');

for(let i=1;i<filas.length;i++){

if(!filas[i].trim()) continue;

const columnas = filas[i].split(',');

datos.push({
MATERIAL: columnas[0],
DESCRIPCION: columnas[1],
ITF: columnas[2],
CENTRO: columnas[3]
});

}

console.log("Registros cargados:", datos.length);

});

function buscar(){

const itf=document.getElementById('itf').value.trim();

const item=datos.find(
x => String(x.ITF).trim() === itf
);

if(item){

document.getElementById('resultado').innerHTML=`
<div class="material">
📦 ${item.MATERIAL}
</div>

<div class="info">
<span class="etiqueta">Descripción:</span><br>
${item.DESCRIPCION}
</div>

<div class="info">
<span class="etiqueta">Centro:</span>
${item.CENTRO}
</div>

<div class="info">
<span class="etiqueta">ITF:</span>
${item.ITF}
</div>
`;

}else{

document.getElementById('resultado').innerHTML=
'<b>Material no encontrado</b>';

}

}
    function iniciarEscaner(){

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
    { facingMode: "environment" },
    {
        fps: 10,
        qrbox: 250
    },
    (codigo) => {

        document.getElementById("itf").value = codigo;

        html5QrCode.stop();

        buscar();

    }
).catch(err => {
    alert("No se pudo abrir la cámara");
});

}
</script>

</body>
</html>
